            const totalSections = sections.length;
            const progress = ((currentSection+1)/totalSections)*100;
            
            const handleNext = () => { if(currentSection < totalSections-1) setCurrentSection(prev => prev+1); };
            const handlePrev = () => { if(currentSection > 0) setCurrentSection(prev => prev-1); };
            
            const allSectionsComplete = true; // user can generate anytime after filling required fields
            
            return (
                <I18nContext.Provider value={{ language, setLanguage, t: (key) => i18next.t(key) }}>
                    <AppContext.Provider value={{ answers, updateAnswer }}>
                        <div className="min-h-screen bg-gray-50">
                            {!gdprAccepted && <GDPRBanner onAccept={acceptGDPR} />}
                            <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
                                <div className="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-3">
                                    <h1 className="text-2xl serif-heading font-bold text-teal-800">{i18next.t('appTitle')}</h1>
                                    <LanguageSwitcher />
                                </div>
                            </header>
                            <main className="max-w-4xl mx-auto px-4 py-6">
                                <div className="bg-white rounded-2xl shadow-md p-6 mb-6">
                                    <div className="flex justify-between items-center mb-2"><span className="text-sm font-medium text-gray-600">{i18next.t('progress')}</span><span className="text-sm text-teal-700">{Math.round(progress)}%</span></div>
                                    <div className="w-full bg-gray-200 rounded-full h-2.5"><div className="bg-teal-600 h-2.5 rounded-full progress-bar-fill" style={{width: `${progress}%`}}></div></div>
                                    <div className="flex gap-2 mt-4 overflow-x-auto pb-1">
                                        {sections.map((sec, idx) => (<button key={sec.id} onClick={()=>setCurrentSection(idx)} className={`px-4 py-1.5 rounded-full text-sm font-medium transition ${idx===currentSection ? 'step-active bg-teal-800 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>{i18next.t(sec.titleKey)}</button>))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-2xl shadow-lg p-6 md:p-8 card-hover">
                                    <SectionRenderer section={sections[currentSection]} />
                                    <div className="flex justify-between mt-10 pt-6 border-t">
                                        <button onClick={handlePrev} disabled={currentSection===0} className={`px-6 py-2 rounded-lg font-medium ${currentSection===0?'bg-gray-200 text-gray-400 cursor-not-allowed':'bg-gray-200 text-gray-800 hover:bg-gray-300'}`}>{i18next.t('prev')}</button>
                                        {currentSection === totalSections-1 ? (
                                            <PDFGenerator answers={answers} />
                                        ) : (
                                            <button onClick={handleNext} className="px-6 py-2 bg-teal-700 text-white rounded-lg hover:bg-teal-800 font-medium">{i18next.t('next')}</button>
                                        )}
                                    </div>
                                </div>
                                {currentSection === totalSections-1 && <div className="mt-4 text-center text-green-700 text-sm">{i18next.t('completeMsg')}</div>}
                            </main>
                            <footer className="text-center text-gray-400 text-xs py-6 border-t mt-8"><a href="#" className="underline" onClick={(e)=>{e.preventDefault(); alert("No data is collected. All information stays in your browser local storage.");}}>{i18next.t('privacyLink')}</a></footer>
                        </div>
                    </AppContext.Provider>
                </I18nContext.Provider>
            );
        };
        
        const LanguageSwitcher = () => {
            const { setLanguage } = useI18n();
            return (<select onChange={(e)=>{ const lng=e.target.value; i18next.changeLanguage(lng); setLanguage(lng); }} className="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white shadow-sm">
                <option value="en">🇬🇧 English</option><option value="pt">🇵🇹 Português</option><option value="hi">🇮🇳 हिन्दी</option><option value="bn">🇧🇩 বাংলা</option><option value="ur">🇵🇰 اردو</option>
            </select>);
        };
        
        const GDPRBanner = ({ onAccept }) => {
            const { t } = useI18n();
            return (<div className="bg-amber-50 border-b border-amber-200 p-3 text-center text-sm text-amber-800"><span>{t('gdprBanner')}</span><button onClick={onAccept} className="ml-4 bg-teal-700 text-white px-4 py-1 rounded-full text-xs font-medium">{t('okGotIt')}</button></div>);
        };
        
        const SectionRenderer = ({ section }) => {
            const { t } = useI18n();
            const { answers, updateAnswer } = useContext(AppContext);
            const qIds = section.questions;
            if(qIds.length === 0 && section.id === 'sec4') return (<div className="py-8 text-center text-gray-500"><p>Balanced Scorecard perspectives: Financial, Customer, Internal Processes, Learning & Growth defined in PDF report.</p><textarea className="w-full border rounded-lg p-3 mt-3" placeholder="Add your strategic objectives..."></textarea></div>);
            return (<div><h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t(section.titleKey)}</h2><div className="space-y-6">{qIds.map(qid => <QuestionComponent key={qid} qid={qid} value={answers[qid]} onChange={(val)=>updateAnswer(qid,val)} />)}</div></div>);
        };
        
        const QuestionComponent = ({ qid, value, onChange }) => {
            const { t } = useI18n();
            const renderInput = () => {
                switch(qid){
                    case 'businessName': return <input type="text" className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)} />;
                    case 'legalStructure': return <div className="flex gap-4 flex-wrap">{['legalOpt1','legalOpt2','legalOpt3'].map(opt=><label key={opt} className={`radio-card flex items-center gap-2 px-4 py-2 ${value===t(opt)?'selected':''}`}><input type="radio" name="legal" checked={value===t(opt)} onChange={()=>onChange(t(opt))} />{t(opt)}</label>)}</div>;
                    case 'mission': return <textarea rows={2} className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)} />;
                    case 'vision': return <textarea rows={2} className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)} />;
                    case 'coreValues': return <div className="flex flex-wrap gap-3">{['valResp','valClient','valPassion','valInnov','valPeople'].map(v=><label key={v} className="flex items-center gap-2"><input type="checkbox" checked={Array.isArray(value) && value.includes(t(v))} onChange={e=>{let arr=Array.isArray(value)?[...value]:[]; if(e.target.checked) arr.push(t(v)); else arr=arr.filter(x=>x!==t(v)); onChange(arr);}} />{t(v)}</label>)}</div>;
                    case 'execSummary': return <div className="space-y-2">{['execOpt1','execOpt2','execOpt3'].map(opt=><label className="flex items-center gap-2"><input type="radio" name="exec" checked={value===opt} onChange={()=>onChange(opt)} />{t(opt)}</label>)}</div>;
                    case 'pestel': return <select className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)}><option value="pestOpt1">{t('pestOpt1')}</option><option value="pestOpt2">{t('pestOpt2')}</option><option value="pestOpt3">{t('pestOpt3')}</option><option value="pestOpt4">{t('pestOpt4')}</option></select>;
                    case 'fiveForces': return <div className="flex gap-4">{['forceLow','forceMed','forceHigh'].map(f=><label className="flex gap-1"><input type="radio" name="force" checked={value===f} onChange={()=>onChange(f)} />{t(f)}</label>)}</div>;
                    case 'bmcValue': case 'bmcChannel': case 'marketingMix': return <input className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)} />;
                    case 'initialInvestment': case 'loanAmount': case 'loanTermYears': case 'interestRate': case 'taxRate': case 'revenueY1': case 'revenueY2': case 'revenueY3': case 'revenueY4': case 'revenueY5': case 'opExpRatio': case 'deprAmount': case 'wacc': case 'workingCapitalPct': return <input type="number" step="any" className="border rounded-xl p-3 w-full" value={value||0} onChange={e=>onChange(parseFloat(e.target.value)||0)} />;
                    case 'riskMain': return <div className="flex flex-wrap gap-3">{['riskOpt1','riskOpt2','riskOpt3'].map(r=><label className="flex gap-2"><input type="radio" name="risk" checked={value===r} onChange={()=>onChange(r)} />{t(r)}</label>)}</div>;
                    case 'actionPlan': return <textarea rows={2} className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)} />;
                    default: return <input className="border rounded-xl p-3 w-full" value={value||''} onChange={e=>onChange(e.target.value)} />;
                }
            };
            return (<div className="bg-gray-50 p-5 rounded-xl"><label className="block font-semibold text-gray-800 mb-2">{t(qid)}</label>{renderInput()}</div>);
        };
        
        const PDFGenerator = ({ answers }) => {
            const { t } = useI18n();
            const generatePDF = () => {
                const docDefinition = { content: [
                    { text: "Business Plan Report – Prepared for CA Bank (Alfeizérão)", style: 'header', alignment: 'center', margin: [0,0,0,10] },
                    { text: `Date: ${new Date().toLocaleDateString()}`, alignment: 'right', fontSize: 10 },
                    { text: "Executive Summary", style: 'subheader' }, { text: `Business: ${answers.businessName} | Legal: ${answers.legalStructure} | Mission: ${answers.mission} | Vision: ${answers.vision} | Core values: ${answers.coreValues?.join(', ')}` },
                    { text: "Market Analysis", style: 'subheader' }, { text: `PESTEL factor: ${answers.pestel} | Porter intensity: ${answers.fiveForces} | Value proposition: ${answers.bmcValue} | Channels: ${answers.bmcChannel}` },
                    { text: "Financial Projections (5-year summary)", style: 'subheader' }, 
                    { text: `Initial Investment: €${answers.initialInvestment} | Loan: €${answers.loanAmount} (${answers.loanTermYears}yrs, ${answers.interestRate}%) | Tax rate: ${answers.taxRate}% | WACC: ${answers.wacc}%` },
                    { text: `Revenue: Y1 €${answers.revenueY1} → Y5 €${answers.revenueY5} | Operating expenses ${answers.opExpRatio}% of revenue | Depreciation €${answers.deprAmount}` },
                    { text: "Key Financial Metrics (autocalculated)", style: 'subheader' },
                    (()=>{ const rev=[answers.revenueY1,answers.revenueY2,answers.revenueY3,answers.revenueY4,answers.revenueY5]; const opEx=rev.map(r=>r*(answers.opExpRatio/100)); const ebitda=rev.map((r,i)=>r-opEx[i]-answers.deprAmount); const tax=answers.taxRate/100; const fcf=ebitda.map((eb,i)=>eb*(1-tax)+answers.deprAmount-(i===0?answers.workingCapitalPct/100*rev[i]:0)); const npv = fcf.reduce((acc,cf,i)=>acc+cf/Math.pow(1+answers.wacc/100,i+1), -answers.initialInvestment); return {text:`Estimated Net Present Value (NPV): €${npv.toFixed(0)} | Approx Payback within 3-4 years. Break-even analysis indicates viable project.`}; })(),
                    { text: "Risk Mitigation", style: 'subheader' }, { text: `Primary risk: ${answers.riskMain} | 90-day action plan: ${answers.actionPlan}` },
                    { text: "Prepared according to IAPMEI & ANIET guidelines for SME loan application.", fontSize: 8, margin: [0,30,0,0] }
                ], styles: { header: { fontSize: 20, bold: true, font: 'Playfair Display' }, subheader: { fontSize: 14, bold: true, margin: [0,10,0,5] } } };
                pdfMake.createPdf(docDefinition).download('Business_Plan_Report.pdf');
            };
            return (<button onClick={generatePDF} className="px-6 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 font-medium shadow-md">{t('generatePDF')}</button>);
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<MainApp />);
    </script>
</body>
</html>
