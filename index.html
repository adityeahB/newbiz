<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Plan Builder</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 17 -->
    <script src="https://cdn.jsdelivr.net/npm/react@17/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <!-- i18n -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@21.10.0/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@6.1.8/i18nextBrowserLanguageDetector.min.js"></script>
</head>

<body class="bg-gray-50">
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

// Minimal working i18n
const i18n = window.i18next;
i18n.use(window.i18nextBrowserLanguageDetector).init({
    resources: {
        en: {
            translation: {
                appTitle: "Business Plan Builder",
                year: "Year",
                revenue: "Revenue",
                externalSupplies: "External Supplies",
                personnelCosts: "Personnel",
                ebitda: "EBITDA",
                depreciation: "Depreciation",
                ebit: "EBIT",
                netIncome: "Net Income"
            }
        }
    },
    fallbackLng: "en",
    initImmediate: false
});

const t = (key) => i18n.t(key);

const App = () => {

    const revs = [85000,110000,135000,155000,170000];
    const opExRatio = 0.55;
    const extSupplies = revs.map(r => r * opExRatio);
    const personnel = revs.map(r => r * 0.2);
    const ebitda = revs.map((r,i) => r - extSupplies[i] - personnel[i]);
    const depr = 8000;
    const ebit = ebitda.map(e => e - depr);
    const netIncome = ebit.map(e => e * 0.79);

    return (
        <div className="max-w-5xl mx-auto p-6">
            <h1 className="text-2xl font-bold mb-6">{t('appTitle')}</h1>

            <div className="overflow-x-auto">
                <table className="min-w-full bg-white border rounded-xl text-sm">

                    {/* ✅ FIXED THEAD */}
                    <thead className="bg-gray-100">
                        <tr>
                            {[t('year'), t('revenue'), t('externalSupplies'), t('personnelCosts'), t('ebitda'), t('depreciation'), t('ebit'), t('netIncome')]
                                .map(h => (
                                    <th key={h} className="p-2 border">{h}</th>
                                ))
                            }
                        </tr>
                    </thead>

                    {/* ✅ FIXED TBODY */}
                    <tbody>
                        {[0,1,2,3,4].map(i => (
                            <tr key={i} className="border-b">
                                <td className="p-2 font-medium">Year {i+1}</td>
                                <td className="p-2">{revs[i].toFixed(0)}</td>
                                <td>{extSupplies[i].toFixed(0)}</td>
                                <td>{personnel[i].toFixed(0)}</td>
                                <td>{ebitda[i].toFixed(0)}</td>
                                <td>{depr.toFixed(0)}</td>
                                <td>{ebit[i].toFixed(0)}</td>
                                <td>{netIncome[i].toFixed(0)}</td>
                            </tr>
                        ))}
                    </tbody>

                </table>
            </div>
        </div>
    );
};

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
