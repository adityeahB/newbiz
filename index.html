                        <div><label className="font-semibold">{t('mission')}</label><textarea rows={2} className="border rounded-xl p-3 w-full" value={answers.mission||''} onChange={e=>updateAnswer('mission',e.target.value)} /></div>
                        <div><label className="font-semibold">{t('vision')}</label><textarea rows={2} className="border rounded-xl p-3 w-full" value={answers.vision||''} onChange={e=>updateAnswer('vision',e.target.value)} /></div>
                        <div><label className="font-semibold">{t('coreValues')}</label><div className="flex flex-wrap gap-3 mt-1">{['valResp','valClient','valPassion','valInnov','valPeople'].map(v=><label key={v} className="flex items-center gap-2 bg-gray-50 px-3 py-1 rounded-full"><input type="checkbox" checked={answers.coreValues?.includes(t(v))} onChange={e=>{let arr=answers.coreValues||[]; if(e.target.checked) arr.push(t(v)); else arr=arr.filter(x=>x!==t(v)); updateAnswer('coreValues',arr);}} />{t(v)}</label>)}</div></div>
                        <div><label className="font-semibold">{t('execSummary')}</label>{['execOpt1','execOpt2','execOpt3'].map(opt=><label key={opt} className="flex items-center gap-2 mt-1"><input type="radio" name="exec" checked={answers.execSummary===opt} onChange={()=>updateAnswer('execSummary',opt)} />{t(opt)}</label>)}</div>
                    </div></div>);
            };
            
            const Section2 = () => {
                const { t } = useI18n();
                const { answers, updateAnswer } = useContext(AppDataContext);
                return (<div><h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t('s2')}</h2>
                    <div className="space-y-5">
                        <div><label className="font-semibold flex items-center gap-1">{t('pestel')} <TooltipIcon textKey="pestelHelp" /></label>
                            <select className="border rounded-xl p-3 w-full mt-1" value={answers.pestel} onChange={e=>updateAnswer('pestel',e.target.value)}><option value="pestOpt1">{t('pestOpt1')}</option><option value="pestOpt2">{t('pestOpt2')}</option><option value="pestOpt3">{t('pestOpt3')}</option><option value="pestOpt4">{t('pestOpt4')}</option></select>
                        </div>
                        <div><label className="font-semibold">{t('fiveForces')}</label><div className="flex gap-4 mt-1 flex-wrap">{['forceLow','forceMed','forceHigh'].map(f=><label key={f} className="flex gap-1 items-center"><input type="radio" name="forces" checked={answers.fiveForces===f} onChange={()=>updateAnswer('fiveForces',f)} />{t(f)}</label>)}</div></div>
                        <div><label className="font-semibold">{t('bmcValue')}</label><input className="border rounded-xl p-3 w-full" value={answers.bmcValue||''} onChange={e=>updateAnswer('bmcValue',e.target.value)} /></div>
                        <div><label className="font-semibold">{t('bmcChannel')}</label><input className="border rounded-xl p-3 w-full" value={answers.bmcChannel||''} onChange={e=>updateAnswer('bmcChannel',e.target.value)} /></div>
                        <div><label className="font-semibold">{t('marketingMix')}</label><input className="border rounded-xl p-3 w-full" value={answers.marketingMix||''} onChange={e=>updateAnswer('marketingMix',e.target.value)} /></div>
                    </div></div>);
            };
            
            const Section3Financial = () => {
                const { t } = useI18n();
                const { answers, updateAnswer } = useContext(AppDataContext);
                const revs = [answers.revenueY1, answers.revenueY2, answers.revenueY3, answers.revenueY4, answers.revenueY5];
                const opExRatio = answers.opExpRatio / 100;
                const extSupplies = revs.map(r => r * opExRatio);
                const personnel = revs.map(r => r * 0.2);
                const ebitda = revs.map((r,i) => r - extSupplies[i] - personnel[i]);
                const depr = answers.deprAmount;
                const ebit = ebitda.map(e => e - depr);
                const taxRate = answers.taxRate / 100;
                const netIncome = ebit.map(e => e * (1 - taxRate));
                
                return (<div><h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t('s3')}</h2>
                    <div className="grid md:grid-cols-2 gap-4 mb-6 bg-gray-50 p-4 rounded-xl">
                        <div><label>{t('initialInvestment')}</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.initialInvestment} onChange={e=>updateAnswer('initialInvestment',parseFloat(e.target.value))} /></div>
                        <div><label>{t('loanAmount')}</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.loanAmount} onChange={e=>updateAnswer('loanAmount',parseFloat(e.target.value))} /></div>
                        <div><label>{t('loanTermYears')}</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.loanTermYears} onChange={e=>updateAnswer('loanTermYears',parseFloat(e.target.value))} /></div>
                        <div><label>{t('interestRate')}</label><input type="number" step="0.1" className="border rounded-xl p-2 w-full" value={answers.interestRate} onChange={e=>updateAnswer('interestRate',parseFloat(e.target.value))} /></div>
                        <div><label>{t('taxRate')}</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.taxRate} onChange={e=>updateAnswer('taxRate',parseFloat(e.target.value))} /></div>
                        <div><label className="flex items-center gap-1">{t('wacc')} <TooltipIcon textKey="waccHelp" /></label><input type="number" step="0.1" className="border rounded-xl p-2 w-full" value={answers.wacc} onChange={e=>updateAnswer('wacc',parseFloat(e.target.value))} /></div>
                        <div><label>{t('opExpRatio')} (%)</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.opExpRatio} onChange={e=>updateAnswer('opExpRatio',parseFloat(e.target.value))} /></div>
                        <div><label>{t('deprAmount')}</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.deprAmount} onChange={e=>updateAnswer('deprAmount',parseFloat(e.target.value))} /></div>
                        <div className="md:col-span-2"><label>{t('workingCapitalPct')} (%)</label><input type="number" className="border rounded-xl p-2 w-full" value={answers.workingCapitalPct} onChange={e=>updateAnswer('workingCapitalPct',parseFloat(e.target.value))} /></div>
                    </div>
                    <h3 className="font-bold text-lg mt-2">{t('plProjection')}</h3>
                    <div className="overflow-x-auto">
                        <table className="min-w-full bg-white border rounded-xl text-sm shadow-sm">
                            <thead className="bg-gray-100"><tr>{[t('year'),t('revenue'),t('externalSupplies'),t('personnelCosts'),t('ebitda'),t('depreciation'),t('ebit'),t('netIncome')].map(h=><th key={h} className="p-2 border">{h}</th>)}</thead>
                            <tbody>{[0,1,2,3,4].map(i=><tr key={i} className="border-b hover:bg-gray-50"><td className="p-2 font-medium">Year {i+1}</td><td className="p-2">{revs[i].toFixed(0)}</td><td className="p-2">{extSupplies[i].toFixed(0)}</td><td className="p-2">{personnel[i].toFixed(0)}</td><td className="p-2">{ebitda[i].toFixed(0)}</td><td className="p-2">{depr.toFixed(0)}</td><td className="p-2">{ebit[i].toFixed(0)}</td><td className="p-2">{netIncome[i].toFixed(0)}</td></tr>)}</tbody>
                        </table>
                    </div>
                    <div className="grid md:grid-cols-5 gap-2 mt-4">
                        {['revenueY1','revenueY2','revenueY3','revenueY4','revenueY5'].map((k,i)=><div key={k}><label className="text-xs">{t(k)}</label><input type="number" className="border rounded-xl p-2 w-full" value={answers[k]} onChange={e=>updateAnswer(k,parseFloat(e.target.value))} /></div>)}
                    </div>
                </div>);
            };
            
            const Section4BSC = () => {
                const { t } = useI18n();
                const { answers, updateAnswer } = useContext(AppDataContext);
                return (<div><h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t('s4')}</h2>
                    <p className="mb-4 text-gray-600 text-sm">{t('bscHelp')}</p>
                    <div className="space-y-4">
                        <div><label className="font-semibold flex items-center gap-1">{t('bscFinancial')} <TooltipIcon textKey="bscHelp" /></label><textarea rows={2} className="border rounded-xl p-3 w-full" value={answers.bscFinancial||''} onChange={e=>updateAnswer('bscFinancial',e.target.value)} placeholder="e.g., Increase net profit margin by 5% by year 3" /></div>
                        <div><label className="font-semibold">{t('bscCustomer')}</label><textarea rows={2} className="border rounded-xl p-3 w-full" value={answers.bscCustomer||''} onChange={e=>updateAnswer('bscCustomer',e.target.value)} placeholder="e.g., Achieve 90% customer satisfaction" /></div>
                        <div><label className="font-semibold">{t('bscProcess')}</label><textarea rows={2} className="border rounded-xl p-3 w-full" value={answers.bscProcess||''} onChange={e=>updateAnswer('bscProcess',e.target.value)} placeholder="e.g., Reduce harvest-to-shelf time by 20%" /></div>
                        <div><label className="font-semibold">{t('bscLearning')}</label><textarea rows={2} className="border rounded-xl p-3 w-full" value={answers.bscLearning||''} onChange={e=>updateAnswer('bscLearning',e.target.value)} placeholder="e.g., Train staff on precision agriculture annually" /></div>
                    </div></div>);
            };
            
            const Section5Risk = () => {
                const { t } = useI18n();
                const { answers, updateAnswer } = useContext(AppDataContext);
                return (<div><h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t('s5')}</h2>
                    <div className="space-y-5">
                        <div><label className="font-semibold">{t('riskMain')}</label>{['riskOpt1','riskOpt2','riskOpt3'].map(r=><label key={r} className="flex items-center gap-2 mt-1"><input type="radio" name="risk" checked={answers.riskMain===r} onChange={()=>updateAnswer('riskMain',r)} />{t(r)}</label>)}</div>
                        <div><label className="font-semibold">{t('actionPlan')}</label><textarea rows={3} className="border rounded-xl p-3 w-full" value={answers.actionPlan||''} onChange={e=>updateAnswer('actionPlan',e.target.value)} /></div>
                    </div></div>);
            };
            
            const PDFGenerator = ({ answers }) => {
                const { t } = useI18n();
                const generatePDF = () => {
                    try {
                        const revs = [answers.revenueY1, answers.revenueY2, answers.revenueY3, answers.revenueY4, answers.revenueY5];
                        const opExRatio = answers.opExpRatio / 100;
                        const extSupplies = revs.map(r => r * opExRatio);
                        const personnel = revs.map(r => r * 0.2);
                        const ebitda = revs.map((r,i) => r - extSupplies[i] - personnel[i]);
                        const ebit = ebitda.map(e => e - answers.deprAmount);
                        const netIncome = ebit.map(e => e * (1 - answers.taxRate/100));
                        
                        const tableBody = [
                            [t('year'), t('revenue'), t('externalSupplies'), t('personnelCosts'), t('ebitda'), t('depreciation'), t('ebit'), t('netIncome')],
                            ...revs.map((_,i)=>[`${t('year')} ${i+1}`, revs[i].toFixed(0), extSupplies[i].toFixed(0), personnel[i].toFixed(0), ebitda[i].toFixed(0), answers.deprAmount.toFixed(0), ebit[i].toFixed(0), netIncome[i].toFixed(0)])
                        ];
                        
                        const docDefinition = {
                            content: [
                                { text: "Business Plan Report – Prepared for CA Bank (Alfeizérão)", style: 'header', alignment: 'center', margin: [0,0,0,10] },
                                { text: `Date: ${new Date().toLocaleDateString()} | Business: ${answers.businessName}`, alignment: 'center', fontSize: 10 },
                                { text: "1. Executive Summary", style: 'subheader' }, 
                                { text: `${answers.execSummary} | Mission: ${answers.mission} | Vision: ${answers.vision} | Core Values: ${answers.coreValues?.join(', ')}`, margin: [0,0,0,10] },
                                { text: "2. Market Analysis", style: 'subheader' }, 
                                { text: `PESTEL: ${answers.pestel} | Porter Intensity: ${answers.fiveForces} | Value Prop: ${answers.bmcValue} | Channel: ${answers.bmcChannel} | Marketing Mix: ${answers.marketingMix}`, margin: [0,0,0,10] },
                                { text: "3. Financial Projections (5-year)", style: 'subheader' },
                                { table: { headerRows: 1, widths: ['auto', 'auto', 'auto', 'auto', 'auto', 'auto', 'auto', 'auto'], body: tableBody }, layout: 'lightHorizontalLines' },
                                { text: `\nInitial Investment: €${answers.initialInvestment} | Loan: €${answers.loanAmount} (${answers.loanTermYears}yrs, ${answers.interestRate}%) | WACC: ${answers.wacc}% | Working Capital Need: ${answers.workingCapitalPct}%`, margin: [0,10,0,10] },
                                { text: "4. Balanced Scorecard", style: 'subheader' }, 
                                { text: `Financial: ${answers.bscFinancial}\nCustomer: ${answers.bscCustomer}\nInternal Processes: ${answers.bscProcess}\nLearning & Growth: ${answers.bscLearning}`, margin: [0,0,0,10] },
                                { text: "5. Risk Mitigation", style: 'subheader' }, 
                                { text: `Primary Risk: ${answers.riskMain}\n90-day Action Plan: ${answers.actionPlan}`, margin: [0,0,0,10] },
                                { text: "Prepared according to IAPMEI & ANIET guidelines for SME loans. This report is a simulation based on user inputs.", fontSize: 8, margin: [0,20,0,0] }
                            ],
                            styles: { header: { fontSize: 18, bold: true, font: 'Playfair Display' }, subheader: { fontSize: 14, bold: true, margin: [0,10,5,0] } }
                        };
                        pdfMake.createPdf(docDefinition).download('Business_Plan_Report.pdf');
                    } catch(e) { alert("Error generating PDF: "+e.message); }
                };
                return (<button onClick={generatePDF} className="px-6 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 font-medium shadow-md transition flex items-center gap-2">📄 {t('generatePDF')}</button>);
            };
            
            // Main App Component
            const MainApp = () => {
                const [answers, setAnswers] = useState(getStored);
                const [currentSection, setCurrentSection] = useState(0);
                const [gdprAccepted, setGdprAccepted] = useState(localStorage.getItem('gdprAccepted') === 'true');
                const [language, setLanguage] = useState(i18n.language);
                
                useEffect(() => { localStorage.setItem('businessPlanAnswers', JSON.stringify(answers)); }, [answers]);
                const updateAnswer = (key, value) => setAnswers(prev => ({ ...prev, [key]: value }));
                const acceptGDPR = () => { setGdprAccepted(true); localStorage.setItem('gdprAccepted', 'true'); };
                
                const sectionsList = ['s1','s2','s3','s4','s5'];
                const progress = ((currentSection+1)/sectionsList.length)*100;
                
                const t = (key) => i18n.t(key);
                
                return (
                    <I18nContext.Provider value={{ language, setLanguage, t }}>
                        <AppDataContext.Provider value={{ answers, updateAnswer }}>
                            <div className="min-h-screen bg-gray-50">
                                {!gdprAccepted && <GDPRBanner onAccept={acceptGDPR} />}
                                <header className="bg-white shadow-sm border-b sticky top-0 z-10 backdrop-blur-sm bg-white/95">
                                    <div className="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center">
                                        <h1 className="text-2xl serif-heading font-bold text-teal-800 tracking-tight">{t('appTitle')}</h1>
                                        <LanguageSwitcher />
                                    </div>
                                </header>
                                <main className="max-w-6xl mx-auto px-4 py-6">
                                    <div className="bg-white rounded-2xl shadow-md p-6 mb-6">
                                        <div className="flex justify-between text-sm"><span>{t('progress')}</span><span>{Math.round(progress)}%</span></div>
                                        <div className="w-full bg-gray-200 rounded-full h-2.5 mt-1"><div className="bg-teal-600 h-2.5 rounded-full progress-bar-fill" style={{width:`${progress}%`}}></div></div>
                                        <div className="flex gap-2 mt-4 flex-wrap">
                                            {sectionsList.map((sec, idx) => <button key={sec} onClick={()=>setCurrentSection(idx)} className={`px-4 py-1.5 rounded-full text-sm font-medium transition ${idx===currentSection ? 'step-active bg-teal-800 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>{t(sec)}</button>)}
                                        </div>
                                    </div>
                                    <RandomFacts />
                                    <div className="bg-white rounded-2xl shadow-lg p-6 md:p-8 card-hover">
                                        {currentSection === 0 && <Section1 />}
                                        {currentSection === 1 && <Section2 />}
                                        {currentSection === 2 && <Section3Financial />}
                                        {currentSection === 3 && <Section4BSC />}
                                        {currentSection === 4 && <Section5Risk />}
                                        <div className="flex justify-between mt-10 pt-6 border-t">
                                            <button onClick={()=>currentSection>0 && setCurrentSection(prev=>prev-1)} disabled={currentSection===0} className={`px-6 py-2 rounded-lg font-medium ${currentSection===0?'bg-gray-200 text-gray-400 cursor-not-allowed':'bg-gray-200 hover:bg-gray-300 text-gray-800'}`}>{t('prev')}</button>
                                            {currentSection === 4 ? <PDFGenerator answers={answers} /> : <button onClick={()=>setCurrentSection(prev=>prev+1)} className="px-6 py-2 bg-teal-700 text-white rounded-lg hover:bg-teal-800 transition shadow-sm">{t('next')}</button>}
                                        </div>
                                    </div>
                                </main>
                                <footer className="text-center py-4 text-gray-400 text-xs border-t mt-10">
                                    <p>Designed in Portugal by Aditya Neil Banerjee</p>
                                    <p className="text-[10px] text-gray-300">Technology demonstrator. Awaiting Go-live authorization</p>
                                </footer>
                            </div>
                        </AppDataContext.Provider>
                    </I18nContext.Provider>
                );
            };
            
            // Render to root
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<MainApp />);
        }).catch(err => {
            document.getElementById('root').innerHTML = `<div class="p-8 text-red-600">Failed to initialize app: ${err.message}</div>`;
        });
    </script>
</body>
</html>
