                    setTimeout(() => {

                        setFade(true);
                    }, 200);
                }, 7000);
                return () => clearInterval(interval);
            }, []);

                <div className={`fact-card p-3 mb-6 rounded-xl shadow-sm text-sm font-medium text-gray-700 flex items-center gap-2 ${fade ? 'fact-fade' : 'opacity-0'}`}>

                        <div><label>{t('opExpRatio')} (%)</label><input type="number" value={answers.opExpRatio} onChange={e => updateAnswer('opExpRatio', parseFloat(e.target.value))} /></div>
                        <div><label>{t('deprAmount')}</label><input type="number" value={answers.deprAmount} onChange={e => updateAnswer('deprAmount', parseFloat(e.target.value))} /></div>
                        <div className="md:col-span-2"><label>{t('workingCapitalPct')} (%)</label><input type="number" value={answers.workingCapitalPct} onChange={e => updateAnswer('workingCapitalPct', parseFloat(e.target.value))} /></div>
                    </div>
                    <h3 className="font-bold text-lg mt-2">{t('plProjection')}</h3>
                    <div className="overflow-x-auto">
                        <table className="min-w-full bg-white border rounded-xl text-sm">
                            <thead className="bg-gray-100"><tr>{[t('year'),t('revenue'),t('externalSupplies'),t('personnelCosts'),t('ebitda'),t('depreciation'),t('ebit'),t('netIncome')].map(h => <th key={h} className="p-2 border">{h}</th>)}</thead>
                            <tbody>{[0,1,2,3,4].map(i => <tr key={i} className="border-b"><td className="p-2 font-medium">Year {i+1}</td><td className="p-2">{revs[i].toFixed(0)}</td><td>{extSupplies[i].toFixed(0)}</td><td>{personnel[i].toFixed(0)}</td><td>{ebitda[i].toFixed(0)}</td><td>{depr.toFixed(0)}</td><td>{ebit[i].toFixed(0)}</td><td>{netIncome[i].toFixed(0)}</td></tr>)}</tbody>
                        </table>
                    </div>
                    <div className="grid md:grid-cols-5 gap-2 mt-4">
                        {['revenueY1','revenueY2','revenueY3','revenueY4','revenueY5'].map((k,i) => <div key={k}><label className="text-xs">{t(k)}</label><input type="number" value={answers[k]} onChange={e => updateAnswer(k, parseFloat(e.target.value))} /></div>)}
                    </div>
                </div>
            );
        };
        
        const Section4BSC = () => {
            const { t } = useI18n();
            const { answers, updateAnswer } = useContext(AppDataContext);
            return (
                <div>
                    <h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t('s4')}</h2>
                    <p className="mb-4 text-gray-600 text-sm">{t('bscHelp')}</p>
                    <div className="space-y-4">
                        <div><label className="font-semibold flex items-center gap-1">{t('bscFinancial')} <TooltipIcon textKey="bscHelp" /></label><textarea rows={2} value={answers.bscFinancial} onChange={e => updateAnswer('bscFinancial', e.target.value)} /></div>
                        <div><label className="font-semibold">{t('bscCustomer')}</label><textarea rows={2} value={answers.bscCustomer} onChange={e => updateAnswer('bscCustomer', e.target.value)} /></div>
                        <div><label className="font-semibold">{t('bscProcess')}</label><textarea rows={2} value={answers.bscProcess} onChange={e => updateAnswer('bscProcess', e.target.value)} /></div>
                        <div><label className="font-semibold">{t('bscLearning')}</label><textarea rows={2} value={answers.bscLearning} onChange={e => updateAnswer('bscLearning', e.target.value)} /></div>
                    </div>
                </div>
            );
        };
        
        const Section5Risk = () => {
            const { t } = useI18n();
            const { answers, updateAnswer } = useContext(AppDataContext);
            return (
                <div>
                    <h2 className="text-2xl serif-heading font-semibold text-teal-900 mb-6">{t('s5')}</h2>
                    <div className="space-y-5">
                        <div><label className="font-semibold">{t('riskMain')}</label>{['riskOpt1','riskOpt2','riskOpt3'].map(r => <label key={r} className="flex items-center gap-2 mt-1"><input type="radio" name="risk" checked={answers.riskMain === r} onChange={() => updateAnswer('riskMain', r)} /> {t(r)}</label>)}</div>
                        <div><label className="font-semibold">{t('actionPlan')}</label><textarea rows={3} value={answers.actionPlan} onChange={e => updateAnswer('actionPlan', e.target.value)} /></div>
                    </div>
                </div>
            );
        };
        
        // PDF Generator
        const PDFGenerator = ({ answers }) => {
            const { t } = useI18n();
            const generatePDF = () => {
                try {
                    const revs = [answers.revenueY1, answers.revenueY2, answers.revenueY3, answers.revenueY4, answers.revenueY5];
                    const opExRatio = answers.opExpRatio / 100;
                    const extSupplies = revs.map(r => r * opExRatio);
                    const personnel = revs.map(r => r * 0.2);
                    const ebitda = revs.map((r,i) => r - extSupplies[i] - personnel[i]);
                    const ebit = ebitda.map(e => e - answers.deprAmount);
                    const netIncome = ebit.map(e => e * (1 - answers.taxRate/100));
                    
                    const tableBody = [
                        [t('year'), t('revenue'), t('externalSupplies'), t('personnelCosts'), t('ebitda'), t('depreciation'), t('ebit'), t('netIncome')],
                        ...revs.map((_,i) => [`${t('year')} ${i+1}`, revs[i].toFixed(0), extSupplies[i].toFixed(0), personnel[i].toFixed(0), ebitda[i].toFixed(0), answers.deprAmount.toFixed(0), ebit[i].toFixed(0), netIncome[i].toFixed(0)])
                    ];
                    
                    const doc = {
                        content: [
                            { text: "Business Plan Report – Prepared for CA Bank (Alfeizérão)", style: 'header', alignment: 'center' },
                            { text: `Date: ${new Date().toLocaleDateString()} | Business: ${answers.businessName}`, alignment: 'center', fontSize: 10, margin: [0,0,0,10] },
                            { text: "1. Executive Summary", style: 'subheader' }, { text: `${answers.execSummary} | Mission: ${answers.mission} | Vision: ${answers.vision} | Values: ${answers.coreValues?.join(', ')}`, margin: [0,0,0,8] },
                            { text: "2. Market Analysis", style: 'subheader' }, { text: `PESTEL: ${answers.pestel} | Porter: ${answers.fiveForces} | Value Prop: ${answers.bmcValue} | Channel: ${answers.bmcChannel}`, margin: [0,0,0,8] },
                            { text: "3. Financial Projections", style: 'subheader' }, { table: { headerRows: 1, widths: ['auto','auto','auto','auto','auto','auto','auto','auto'], body: tableBody }, layout: 'lightHorizontalLines' },
                            { text: `\nInvestment: €${answers.initialInvestment} | Loan: €${answers.loanAmount} (${answers.loanTermYears}yrs, ${answers.interestRate}%) | WACC: ${answers.wacc}%`, margin: [0,8,0,8] },
                            { text: "4. Balanced Scorecard", style: 'subheader' }, { text: `Financial: ${answers.bscFinancial}\nCustomer: ${answers.bscCustomer}\nProcess: ${answers.bscProcess}\nLearning: ${answers.bscLearning}`, margin: [0,0,0,8] },
                            { text: "5. Risk Mitigation", style: 'subheader' }, { text: `Risk: ${answers.riskMain}\nAction Plan: ${answers.actionPlan}` },
                            { text: "Prepared according to IAPMEI & ANIET guidelines.", fontSize: 8, margin: [0,20,0,0] }
                        ],
                        styles: { header: { fontSize: 18, bold: true, font: 'Playfair Display' }, subheader: { fontSize: 14, bold: true, margin: [0,10,5,0] } }
                    };
                    pdfMake.createPdf(doc).download('Business_Plan_Report.pdf');
                } catch(e) { alert("PDF Error: " + e.message); }
            };
            return <button onClick={generatePDF} className="px-6 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 font-medium shadow-md flex items-center gap-2">📄 {t('generatePDF')}</button>;
        };
        
        // Main App
        const App = () => {
            const [answers, setAnswers] = useState(getStored);
            const [currentSection, setCurrentSection] = useState(0);
            const [gdprAccepted, setGdprAccepted] = useState(localStorage.getItem('gdprAccepted') === 'true');
            const [language, setLanguage] = useState(i18n.language);
            
            useEffect(() => { localStorage.setItem('businessPlanAnswers', JSON.stringify(answers)); }, [answers]);
            const updateAnswer = (key, value) => setAnswers(prev => ({ ...prev, [key]: value }));
            const acceptGDPR = () => { setGdprAccepted(true); localStorage.setItem('gdprAccepted', 'true'); };
            
            const sections = ['s1','s2','s3','s4','s5'];
            const progress = ((currentSection+1)/sections.length)*100;
            const t = (key) => i18n.t(key);
            
            return (
                <I18nContext.Provider value={{ language, setLanguage, t }}>
                    <AppDataContext.Provider value={{ answers, updateAnswer }}>
                        <div className="min-h-screen bg-gray-50">
                            {!gdprAccepted && <GDPRBanner onAccept={acceptGDPR} />}
                            <header className="bg-white shadow-sm border-b sticky top-0 z-10">
                                <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                                    <h1 className="text-2xl serif-heading font-bold text-teal-800">{t('appTitle')}</h1>
                                    <LanguageSwitcher />
                                </div>
                            </header>
                            <main className="max-w-6xl mx-auto px-4 py-6">
                                <div className="bg-white rounded-2xl shadow-md p-6 mb-6">
                                    <div className="flex justify-between text-sm"><span>{t('progress')}</span><span>{Math.round(progress)}%</span></div>
                                    <div className="w-full bg-gray-200 rounded-full h-2.5 mt-1"><div className="bg-teal-600 h-2.5 rounded-full progress-bar-fill" style={{width:`${progress}%`}}></div></div>
                                    <div className="flex gap-2 mt-4 flex-wrap">
                                        {sections.map((sec, idx) => <button key={sec} onClick={() => setCurrentSection(idx)} className={`px-4 py-1.5 rounded-full text-sm font-medium transition ${idx === currentSection ? 'step-active bg-teal-800 text-white' : 'bg-gray-100 text-gray-700'}`}>{t(sec)}</button>)}
                                    </div>
                                </div>
                                <RandomFacts />
                                <div className="bg-white rounded-2xl shadow-lg p-6 md:p-8">
                                    {currentSection === 0 && <Section1 />}
                                    {currentSection === 1 && <Section2 />}
                                    {currentSection === 2 && <Section3Financial />}
                                    {currentSection === 3 && <Section4BSC />}
                                    {currentSection === 4 && <Section5Risk />}
                                    <div className="flex justify-between mt-10 pt-6 border-t">
                                        <button onClick={() => currentSection > 0 && setCurrentSection(prev => prev-1)} disabled={currentSection === 0} className={`px-6 py-2 rounded-lg font-medium ${currentSection === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-200 hover:bg-gray-300'}`}>{t('prev')}</button>
                                        {currentSection === 4 ? <PDFGenerator answers={answers} /> : <button onClick={() => setCurrentSection(prev => prev+1)} className="px-6 py-2 bg-teal-700 text-white rounded-lg hover:bg-teal-800">{t('next')}</button>}
                                    </div>
                                </div>
                            </main>
                            <footer className="text-center py-4 text-gray-400 text-xs border-t mt-10">
                                <p>Designed in Portugal by Aditya Neil Banerjee</p>
                                <p className="text-[10px] text-gray-300">Technology demonstrator. Awaiting Go-live authorization</p>
                            </footer>
                        </div>
                    </AppDataContext.Provider>
                </I18nContext.Provider>
            );
        };
        
        // Render using ReactDOM.render (React 17)
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
