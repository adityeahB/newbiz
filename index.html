            border-radius: 0.625rem; border: 1.5px solid #d1d5db;

            outline: none; border-color: #b8902e;
            box-shadow: 0 0 0 3px rgba(184,144,46,0.15);

        .radio-card {
            border: 1.5px solid #e5e7eb; border-radius: 0.75rem;
            padding: 0.6rem 1rem; cursor: pointer; transition: all 0.15s;
            font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .radio-card.selected { border-color: #0e3c3e; background: #eef7f7; color: #0e3c3e; font-weight: 500; }
        .check-chip {
            border: 1.5px solid #e5e7eb; border-radius: 2rem;
            padding: 0.35rem 0.85rem; cursor: pointer; transition: all 0.15s;
            font-size: 0.88rem; display: flex; align-items: center; gap: 0.4rem;
        }
        .check-chip.selected { border-color: #0e3c3e; background: #eef7f7; color: #0e3c3e; font-weight: 500; }
        .fact-bar {
            background: linear-gradient(90deg, #fffbea 0%, #fef3c7 100%);
            border-left: 4px solid #b8902e; border-radius: 0 0.75rem 0.75rem 0;
        }
        @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadein 0.35s ease; }
        .step-pill {
            padding: 0.35rem 1rem; border-radius: 2rem; font-size: 0.82rem;
            font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s;
        }
        .step-pill.active { background: #0e3c3e; color: #fff; }
        .step-pill.done { background: #d1fae5; color: #065f46; }
        .step-pill.inactive { background: #e5e7eb; color: #6b7280; }
        table { border-collapse: collapse; width: 100%; font-size: 0.82rem; }
        th { background: #f0f4f4; color: #374151; padding: 0.5rem 0.6rem; text-align: right; font-weight: 600; }
        th:first-child { text-align: left; }
        td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #f3f4f6; text-align: right; }
        td:first-child { text-align: left; font-weight: 500; color: #0e3c3e; }
        tr:last-child td { border-bottom: none; }
        .num-pos { color: #065f46; }
        .num-neg { color: #be123c; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #b8902e44; border-radius: 10px; }
    </style>
</head>

function loadData() {
  try { const s = localStorage.getItem('bpb_v2'); return s ? {...DEFAULTS,...JSON.parse(s)} : {...DEFAULTS}; }
  catch { return {...DEFAULTS}; }
}

// ─── CONTEXTS ─────────────────────────────────────────────────────────────────
const LangCtx = createContext();
const DataCtx = createContext();
const useLang = () => useContext(LangCtx);
const useData = () => useContext(DataCtx);

// ─── UTIL ──────────────────────────────────────────────────────────────────────
const fmt = n => {
  const v = Number(n);
  if (isNaN(v)) return '—';
  return v < 0 ? `-€${Math.abs(v).toLocaleString('pt-PT')}` : `€${v.toLocaleString('pt-PT')}`;
};
const cls = (...a) => a.filter(Boolean).join(' ');

function calcPL(d) {
  const revs = [d.r1y,d.r2y,d.r3y,d.r4y,d.r5y].map(Number);
  const op = d.opEx / 100;
  return revs.map((r,i) => {
    const sup = r * op;
    const pers = r * 0.20;
    const ebitda = r - sup - pers;
    const ebit = ebitda - d.depr;
    const ni = ebit * (1 - d.irc/100);
    return { yr:i+1, rev:r, sup, pers, ebitda, depr:+d.depr, ebit, ni };
  });
}

// ─── LABEL HELPER ─────────────────────────────────────────────────────────────

    </label>
  );
};

        <FieldLabel k="vision" />

        <FieldLabel k="exec" />

  );
}

    <div className="space-y-6 fade-in">

        <NumInput k="intRate" step="0.1" /> <NumInput k="irc" /> <NumInput k="wacc" step="0.1" />

        <h3 className="serif font-semibold text-teal-900 text-lg mb-2">{t('plTitle')}</h3>
        <div className="grid grid-cols-5 gap-2 mb-3">

            </thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.yr}>

                  <td>{fmt(r.rev)}</td>
                  <td className="num-neg">{fmt(r.sup)}</td>
                  <td className="num-neg">{fmt(r.pers)}</td>
                  <td className={r.ebitda>=0?'num-pos':'num-neg'}>{fmt(r.ebitda)}</td>

// ─── PDF GENERATOR ────────────────────────────────────────────────────────────
function generatePDF(d, t) {
  try {
    const rows = calcPL(d);
    const tableBody = [
      [{text:t('colYr'),bold:true},{text:t('colRev'),bold:true},{text:t('colSupp'),bold:true},
       {text:t('colPers'),bold:true},{text:t('colEBITDA'),bold:true},{text:t('colDepr'),bold:true},
       {text:t('colEBIT'),bold:true},{text:t('colNI'),bold:true}],
      ...rows.map(r=>[
        `Year ${r.yr}`, fmt(r.rev), fmt(r.sup), fmt(r.pers),
        fmt(r.ebitda), fmt(r.depr), fmt(r.ebit), fmt(r.ni)
      ])
    ];

    const doc = {
      pageMargins:[40,60,40,60],
      content:[
        {text:'BUSINESS PLAN REPORT', style:'h1', alignment:'center'},
        {text:`Prepared for banking review  •  ${new Date().toLocaleDateString('en-GB')}`, alignment:'center', fontSize:10, color:'#6b7280', margin:[0,4,0,0]},
        {text:d.bName, alignment:'center', fontSize:14, bold:true, color:'#0e3c3e', margin:[0,6,0,20]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:1,lineColor:'#b8902e'}]},
        {text:'1. Foundational Elements', style:'h2'},
        {text:`Legal structure: ${t(d.legalStr)}`, margin:[0,0,0,4]},
        {text:`Mission: ${d.mission}`, margin:[0,0,0,4]},
        {text:`Vision: ${d.vision}`, margin:[0,0,0,4]},
        {text:`Core Values: ${(d.values||[]).map(v=>t(v)).join(', ')}`, margin:[0,0,0,4]},
        {text:`Executive Summary type: ${t(d.exec)}`, margin:[0,0,0,12]},

// ─── RANDOM FACTS ─────────────────────────────────────────────────────────────
function FactBanner() {
  const { t } = useLang();
  const keys = ['fact1','fact2','fact3','fact4','fact5','fact6'];
  const [idx, setIdx] = useState(0);
  const [vis, setVis] = useState(true);
  useEffect(()=>{
    const iv = setInterval(()=>{
      setVis(false);
      setTimeout(()=>{ setIdx(i=>(i+1)%keys.length); setVis(true); },300);
    },7000);
    return ()=>clearInterval(iv);
  },[]);
  return (
    <div className={`fact-bar px-4 py-2.5 mb-5 rounded-r-xl text-sm text-amber-900 font-medium transition-opacity duration-300 ${vis?'opacity-100':'opacity-0'}`}>
      {t(keys[idx])}
    </div>
  );
}

// ─── MAIN APP (fixed: removed 'export default') ────────────────────────────────────────────────
const SECTIONS = ['s1','s2','s3','s4','s5'];
const SECTION_TITLES = { s1:'Sec1', s2:'Sec2', s3:'Sec3', s4:'Sec4', s5:'Sec5' };

function App() {
  const [lang, setLang] = useState(()=>{
    const browser = (navigator.language||'en').slice(0,2);
    return TRANS[browser] ? browser : 'en';
  });
  const [d, setD] = useState(loadData);
  const [sec, setSec] = useState(0);

  const upd = useCallback((k,v)=>setD(prev=>({...prev,[k]:v})),[]);
  const t = useCallback((k)=>(TRANS[lang]||TRANS.en)[k]||k,[lang]);

  const acceptGdpr = ()=>{ setGdpr(true); localStorage.setItem('bpb_gdpr','1'); };

  const SectionComp = { Sec1, Sec2, Sec3, Sec4, Sec5 };
  const CurrentSection = SectionComp[SECTION_TITLES[SECTIONS[sec]]];

  return (
    <LangCtx.Provider value={{lang,setLang,t}}>
      <DataCtx.Provider value={{d,upd}}>
        <div className="min-h-screen">

          {/* GDPR */}
          {!gdpr && (
            <div className="bg-amber-50 border-b border-amber-200 px-4 py-2 flex items-center justify-between gap-4 text-sm text-amber-800">
              <span>{t('gdpr')}</span>
              <button onClick={acceptGdpr}
                      className="shrink-0 bg-teal-700 text-white text-xs px-3 py-1 rounded-full hover:bg-teal-800 transition">
                {t('gotIt')}
              </button>
            </div>
          )}

          {/* HEADER */}
          <header className="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-20">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
              <div>
                <h1 className="serif text-xl font-bold text-teal-900 leading-none">{t('appTitle')}</h1>
                <p className="text-xs text-amber-700 mt-0.5">{t('tagline')}</p>
              </div>
              <select value={lang} onChange={e=>setLang(e.target.value)}
                      className="text-sm border border-gray-200 rounded-lg px-2 py-1.5 bg-white w-auto">
                <option value="en">🇬🇧 English</option>
                <option value="pt">🇵🇹 Português</option>
              </select>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-6">

            {/* PROGRESS */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-5">
              <div className="flex justify-between text-xs text-gray-500 mb-1.5">
                <span className="font-medium">{t('progress')}</span>
                <span>{Math.round(((sec+1)/SECTIONS.length)*100)}%</span>
              </div>
              <div className="w-full bg-gray-100 rounded-full h-2 mb-3">
                <div className="bg-gradient-to-r from-teal-700 to-teal-500 h-2 rounded-full transition-all duration-500"
                     style={{width:`${((sec+1)/SECTIONS.length)*100}%`}} />
              </div>
              <div className="flex gap-2 flex-wrap">
                {SECTIONS.map((s,i)=>(
                  <button key={s} onClick={()=>setSec(i)}
                          className={cls('step-pill',
                            i===sec?'active': i<sec?'done':'inactive')}>
                    {i<sec?'✓ ':''}{t(s)}
                  </button>
                ))}
              </div>
            </div>

            <FactBanner />

            {/* SECTION CARD */}
            <div className="bg-white rounded-2xl shadow-md border border-gray-100 p-6 md:p-8">
              <h2 className="serif text-2xl font-bold text-teal-900 mb-6">{t(SECTIONS[sec])}</h2>
              <CurrentSection />

              {/* NAV BUTTONS */}
              <div className="flex justify-between items-center mt-10 pt-6 border-t border-gray-100">
                <button
                  onClick={()=>sec>0&&setSec(s=>s-1)}
                  disabled={sec===0}
                  className={cls('px-5 py-2 rounded-xl text-sm font-medium transition',
                    sec===0?'text-gray-300 cursor-not-allowed':'bg-gray-100 hover:bg-gray-200 text-gray-700')}>
                  {t('prev')}
                </button>
                {sec===SECTIONS.length-1
                  ? <button onClick={()=>generatePDF(d,t)}
                            className="px-6 py-2.5 bg-amber-600 hover:bg-amber-700 text-white rounded-xl text-sm font-semibold shadow-md transition">
                      {t('genPDF')}
                    </button>
                  : <button onClick={()=>setSec(s=>s+1)}
                            className="px-6 py-2.5 bg-teal-700 hover:bg-teal-800 text-white rounded-xl text-sm font-semibold shadow-md transition">
                      {t('next')}
                    </button>
                }
              </div>
            </div>
          </main>

          <footer className="text-center py-6 text-xs text-gray-300 border-t mt-8">
            Designed in Portugal by Aditya Neil Banerjee &nbsp;·&nbsp; Technology demonstrator · Awaiting Go-live authorisation
          </footer>
        </div>
      </DataCtx.Provider>
    </LangCtx.Provider>
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
