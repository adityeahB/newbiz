            padding: 0.625rem 0.875rem;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: #FFFFFF;
            transition: all 0.2s;

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .radio-card {
            border: 1px solid #E5E7EB;
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
        }
        .radio-card.selected {
            border-color: var(--primary);
            background: #EEF2FF;
            color: var(--primary);
            font-weight: 500;
        }
        .check-chip {
            border: 1px solid #E5E7EB;
            border-radius: 2rem;
            padding: 0.35rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: white;
            font-weight: 500;
        }
        .check-chip.selected {
            border-color: var(--primary);
            background: #EEF2FF;
            color: var(--primary);
        }
        .check-chip:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .fact-bar {
            background: linear-gradient(90deg, #FEF3C7 0%, #FFFBEB 100%);
            border-left: 4px solid var(--accent);
            border-radius: 0 0.75rem 0.75rem 0;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadein 0.35s ease; }
        .step-pill {
            padding: 0.35rem 1.25rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #F3F4F6;
            color: #4B5563;
        }
        .step-pill.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 6px rgba(79,70,229,0.3);
        }
        .step-pill.done {
            background: #D1FAE5;
            color: #065F46;
        }
        .step-pill.inactive {
            background: #F3F4F6;
            color: #9CA3AF;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.8rem;
        }
        th {
            background: #F3F4F6;
            color: #1F2937;
            padding: 0.6rem 0.75rem;
            text-align: right;
            font-weight: 600;
        }
        th:first-child { text-align: left; }
        td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #F3F4F6;
            text-align: right;
        }
        td:first-child { text-align: left; font-weight: 500; color: #1F2937; }
        .num-pos { color: #10B981; font-weight: 500; }
        .num-neg { color: #EF4444; }
        .btn-primary {
            background: var(--primary);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: white;
            border: 1px solid #E5E7EB;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #F9FAFB;
            border-color: var(--primary);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1);
        }
    </style>
</head>

function loadData() {
  try { const s = localStorage.getItem('airo_bpb_v2'); return s ? {...DEFAULTS,...JSON.parse(s)} : {...DEFAULTS}; }
  catch { return {...DEFAULTS}; }
}

// ─── CONTEXTS ─────────────────────────────────────────────────────────────────
const LangCtx = createContext();
const DataCtx = createContext();
const useLang = () => useContext(LangCtx);
const useData = () => useContext(DataCtx);

// ─── UTIL ──────────────────────────────────────────────────────────────────────
const fmt = n => {
  const v = Number(n);
  if (isNaN(v)) return '—';
  return v < 0 ? `-€${Math.abs(v).toLocaleString('pt-PT')}` : `€${v.toLocaleString('pt-PT')}`;
};
const cls = (...a) => a.filter(Boolean).join(' ');

function calcPL(d) {
  const revs = [d.r1y,d.r2y,d.r3y,d.r4y,d.r5y].map(Number);
  const op = d.opEx / 100;
  return revs.map((r,i) => {
    const sup = r * op;
    const pers = r * 0.20;
    const ebitda = r - sup - pers;
    const ebit = ebitda - d.depr;
    const ni = ebit * (1 - d.irc/100);
    return { yr:i+1, rev:r, sup, pers, ebitda, depr:+d.depr, ebit, ni };
  });
}

// ─── LABEL HELPER ─────────────────────────────────────────────────────────────

    </label>
  );
};

function Sec1() {

  return (
    <div className="space-y-6 fade-in">
      <div>
        <FieldLabel k="bName" />
        <input value={d.bName} onChange={e=>upd('bName',e.target.value)} />
      </div>
      <div>
        <FieldLabel k="legalStr" />
        <div className="flex gap-2 flex-wrap mt-1">
          {legalOpts.map(o=>(
            <label key={o} className={cls('radio-card', d.legalStr===o&&'selected')}>
              <input type="radio" name="legal" checked={d.legalStr===o} onChange={()=>upd('legalStr',o)} className="sr-only" />
              {t(o)}
            </label>
          ))}
        </div>
        <a href="https://info.portaldasfinancas.gov.pt" target="_blank" rel="noreferrer" className="text-xs text-indigo-600 underline mt-1 inline-block">↗ Portal das Finanças</a>
      </div>
      <div>
        <FieldLabel k="mission" />
        <textarea rows={2} value={d.mission} onChange={e=>upd('mission',e.target.value)} />
      </div>
      <div>
        <FieldLabel k="vision" />
        <textarea rows={2} value={d.vision} onChange={e=>upd('vision',e.target.value)} />
      </div>
      <div>
        <FieldLabel k="values" />
        <div className="flex flex-wrap gap-2 mt-1">
          {valOpts.map(v=>{
            const sel = (d.values||[]).includes(v);
            return (
              <button
                key={v}
                type="button"
                role="switch"
                aria-checked={sel}
                onClick={()=>{
                  const arr = d.values||[];
                  upd('values', sel ? arr.filter(x=>x!==v) : [...arr,v]);
                }}
                className={cls('check-chip', sel&&'selected')}
              >
                {sel ? '✓ ' : ''}{t(v)}
              </button>
            );
          })}
        </div>
      </div>
      <div>
        <FieldLabel k="exec" />
        <div className="space-y-2 mt-1">
          {execOpts.map(o=>(
            <label key={o} className={cls('radio-card', d.exec===o&&'selected')}>
              <input type="radio" name="exec" checked={d.exec===o} onChange={()=>upd('exec',o)} className="sr-only" />
              {t(o)}
            </label>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PDF GENERATOR (with custom font registration) ────────────────────────────
function generatePDF(d, t) {
  try {
    // Register custom font to avoid missing font warning
    pdfMake.fonts = {
      Roboto: {
        normal: 'Roboto-Regular.ttf',
        bold: 'Roboto-Medium.ttf',
        italics: 'Roboto-Italic.ttf',
        bolditalics: 'Roboto-MediumItalic.ttf'
      }
    };
    const rows = calcPL(d);
    const tableBody = [
      [{text:t('colYr'),bold:true},{text:t('colRev'),bold:true},{text:t('colSupp'),bold:true},{text:t('colPers'),bold:true},{text:t('colEBITDA'),bold:true},{text:t('colDepr'),bold:true},{text:t('colEBIT'),bold:true},{text:t('colNI'),bold:true}],
      ...rows.map(r=>[`Year ${r.yr}`, fmt(r.rev), fmt(r.sup), fmt(r.pers), fmt(r.ebitda), fmt(r.depr), fmt(r.ebit), fmt(r.ni)])
    ];
    const doc = {
      pageMargins:[40,60,40,60],
      content:[
        {text:'AIRO BUSINESS PLAN REPORT', style:'h1', alignment:'center'},
        {text:`Prepared for grant readiness • ${new Date().toLocaleDateString('en-GB')}`, alignment:'center', fontSize:10, color:'#6b7280', margin:[0,4,0,0]},
        {text:d.bName, alignment:'center', fontSize:14, bold:true, color:'#4F46E5', margin:[0,6,0,20]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:1,lineColor:'#4F46E5'}]},
        {text:'1. Foundational Elements', style:'h2'},{text:`Legal structure: ${t(d.legalStr)}`, margin:[0,0,0,4]},{text:`Mission: ${d.mission}`, margin:[0,0,0,4]},{text:`Vision: ${d.vision}`, margin:[0,0,0,4]},{text:`Core Values: ${(d.values||[]).map(v=>t(v)).join(', ')}`, margin:[0,0,0,4]},{text:`Executive Summary type: ${t(d.exec)}`, margin:[0,0,0,12]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#e5e7eb'}]},{text:'2. Market Analysis', style:'h2'},{text:`Key PESTEL factor: ${t(d.pestel)}`, margin:[0,0,0,4]},{text:`Porter's intensity: ${t(d.porter)}`, margin:[0,0,0,4]},{text:`Value proposition: ${d.bmcVal}`, margin:[0,0,0,4]},{text:`Main channel: ${d.bmcCh}`, margin:[0,0,0,4]},{text:`Marketing mix focus: ${d.mktMix}`, margin:[0,0,0,12]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#e5e7eb'}]},{text:'3. Financial Projections', style:'h2'},{columns:[{text:`Initial investment: ${fmt(d.initInv)}`, fontSize:10},{text:`Loan: ${fmt(d.loan)} over ${d.loanYrs} yrs @ ${d.intRate}%`, fontSize:10},{text:`WACC: ${d.wacc}% | IRC: ${d.irc}%`, fontSize:10}], margin:[0,0,0,8]},{table:{headerRows:1, widths:['auto','*','*','*','*','auto','*','*'], body:tableBody}, layout:{fillColor:(ri)=>ri===0?'#f0f4f4':null}, margin:[0,0,0,12]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#e5e7eb'}]},{text:'4. Balanced Scorecard', style:'h2'},{text:`💰 Financial: ${d.bscFin}`, margin:[0,0,0,4]},{text:`🤝 Customer: ${d.bscCust}`, margin:[0,0,0,4]},{text:`⚙️ Processes: ${d.bscProc}`, margin:[0,0,0,4]},{text:`📚 Learning: ${d.bscLearn}`, margin:[0,0,0,12]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#e5e7eb'}]},{text:'5. Risk & Mitigation', style:'h2'},{text:`Primary risk: ${t(d.riskMain)}`, margin:[0,0,0,4]},{text:`90-day action plan: ${d.action}`, margin:[0,0,0,20]},
        {text:'Prepared with AIRO • Grant application support', fontSize:8, color:'#9ca3af', alignment:'center'},{text:'More resources: https://drive.google.com/drive/folders/1k0ozTSS4cL9zHQIOaLmywet0e9Z_gLyV', fontSize:7, color:'#d1d5db', alignment:'center', margin:[0,4,0,0]}
      ],
      styles:{h1:{fontSize:20, bold:true, color:'#4F46E5', margin:[0,0,0,4]},h2:{fontSize:13, bold:true, color:'#1F2937', margin:[0,14,0,6]}},
      defaultStyle:{font:'Roboto', fontSize:10, color:'#374151', lineHeight:1.4}
    };
    pdfMake.createPdf(doc).download(`AIRO_BusinessPlan_${d.bName.replace(/\s/g,'_')}.pdf`);
  } catch(e) { alert('PDF error: ' + e.message); }
}

// ─── RANDOM FACTS ─────────────────────────────────────────────────────────────
function FactBanner() {
  const { t } = useLang();
  const keys = ['fact1','fact2','fact3','fact4','fact5','fact6'];
  const [idx, setIdx] = useState(0); const [vis, setVis] = useState(true);
  useEffect(()=>{ const iv = setInterval(()=>{ setVis(false); setTimeout(()=>{ setIdx(i=>(i+1)%keys.length); setVis(true); },300); },7000); return ()=>clearInterval(iv); },[]);
  return (<div className={`fact-bar px-4 py-2.5 mb-5 rounded-r-xl text-sm text-amber-800 font-medium transition-opacity duration-300 ${vis?'opacity-100':'opacity-0'}`}>{t(keys[idx])}</div>);
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const SECTIONS = ['s1','s2','s3','s4','s5'];
const SECTION_TITLES = { s1:'Sec1', s2:'Sec2', s3:'Sec3', s4:'Sec4', s5:'Sec5' };

function App() {
  const [lang, setLang] = useState(()=>{ const browser = (navigator.language||'en').slice(0,2); return TRANS[browser] ? browser : 'en'; });
  const [d, setD] = useState(loadData);
  const [sec, setSec] = useState(0);
  const [gdpr, setGdpr] = useState(()=>localStorage.getItem('airo_gdpr')==='1');
  useEffect(()=>{ localStorage.setItem('airo_bpb_v2', JSON.stringify(d)); },[d]);
  const upd = useCallback((k,v)=>setD(prev=>({...prev,[k]:v})),[]);
  const t = useCallback((k)=>(TRANS[lang]||TRANS.en)[k]||k,[lang]);
  const acceptGdpr = ()=>{ setGdpr(true); localStorage.setItem('airo_gdpr','1'); };
  const SectionComp = { Sec1, Sec2, Sec3, Sec4, Sec5 };
  const CurrentSection = SectionComp[SECTION_TITLES[SECTIONS[sec]]];

  return (
    <LangCtx.Provider value={{lang,setLang,t}}>
      <DataCtx.Provider value={{d,upd}}>
        <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
          {!gdpr && (<div className="bg-indigo-50 border-b border-indigo-200 px-4 py-2 flex items-center justify-between gap-4 text-sm text-indigo-800"><span>{t('gdpr')}</span><button onClick={acceptGdpr} className="shrink-0 bg-indigo-600 text-white text-xs px-3 py-1 rounded-full hover:bg-indigo-700 transition">{t('gotIt')}</button></div>)}
          <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
            <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <img src="https://www.airo.pt/images/airo_Branco.png" alt="AIRO" className="h-10 w-auto bg-indigo-700 rounded-lg p-1.5" style={{background: 'linear-gradient(135deg, #4F46E5, #7C3AED)'}} />
                <div><h1 className="text-xl font-bold text-indigo-900 leading-none">{t('appTitle')}</h1><p className="text-xs text-indigo-600 mt-0.5">{t('tagline')}</p></div>
              </div>
              <div className="flex items-center gap-3">
                <a href="https://drive.google.com/drive/folders/1k0ozTSS4cL9zHQIOaLmywet0e9Z_gLyV" target="_blank" rel="noopener noreferrer" className="text-xs bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1.5 text-gray-700 transition flex items-center gap-1">{t('resources')}</a>
                <select value={lang} onChange={e=>setLang(e.target.value)} className="text-sm border border-gray-200 rounded-lg px-2 py-1.5 bg-white"><option value="en">🇬🇧 EN</option><option value="pt">🇵🇹 PT</option></select>
              </div>
            </div>
          </header>
          <main className="max-w-5xl mx-auto px-4 py-8">
            <div className="bg-white rounded-2xl shadow-lg border border-gray-100 p-5 mb-6 card-hover">
              <div className="flex justify-between text-xs text-gray-500 mb-1.5"><span className="font-medium">{t('progress')}</span><span>{Math.round(((sec+1)/SECTIONS.length)*100)}%</span></div>
              <div className="w-full bg-gray-100 rounded-full h-2 mb-4"><div className="bg-gradient-to-r from-indigo-600 to-indigo-400 h-2 rounded-full transition-all duration-500" style={{width:`${((sec+1)/SECTIONS.length)*100}%`}} /></div>
              <div className="flex gap-2 flex-wrap">{SECTIONS.map((s,i)=>(<button key={s} onClick={()=>setSec(i)} className={cls('step-pill', i===sec?'active': i<sec?'done':'inactive')}>{i<sec?'✓ ':''}{t(s)}</button>))}</div>
            </div>
            <FactBanner />
            <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 md:p-8 transition-all">
              <h2 className="text-2xl font-bold text-indigo-900 mb-6">{t(SECTIONS[sec])}</h2>
              <CurrentSection />
              <div className="flex justify-between items-center mt-10 pt-6 border-t border-gray-100">
                <button onClick={()=>sec>0&&setSec(s=>s-1)} disabled={sec===0} className={cls('px-5 py-2.5 rounded-xl text-sm font-medium transition', sec===0?'text-gray-300 cursor-not-allowed bg-gray-100':'bg-white border border-gray-200 hover:border-indigo-300 text-gray-700')}>{t('prev')}</button>
                {sec===SECTIONS.length-1 ? <button onClick={()=>generatePDF(d,t)} className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md transition transform hover:-translate-y-0.5">{t('genPDF')}</button> : <button onClick={()=>setSec(s=>s+1)} className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md transition">{t('next')}</button>}
              </div>
            </div>
          </main>
          <footer className="text-center py-8 text-xs text-gray-400 border-t mt-12 bg-white">
            <div className="max-w-5xl mx-auto px-4 flex flex-col gap-2">
              <p>© AIRO — Intelligent Grant Applications • <a href="https://www.airo.pt" target="_blank" className="text-indigo-500 hover:underline">airo.pt</a></p>
              <p>Support materials & templates: <a href="https://drive.google.com/drive/folders/1k0ozTSS4cL9zHQIOaLmywet0e9Z_gLyV" target="_blank" rel="noopener noreferrer" className="text-indigo-500 hover:underline">Grant Resources Folder</a></p>
              <p className="text-gray-300">Technology demonstrator • Pre‑compile JSX for production deployment</p>
            </div>
          </footer>
        </div>
      </DataCtx.Provider>
    </LangCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
